<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva Web Tools</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      color: #1a1a1a;
      background: #fff;
      -webkit-font-smoothing: antialiased;
    }

    .layout {
      display: flex;
      min-height: 100vh;
      max-width: 1440px;
      margin: 0 auto;
      padding: 40px;
      gap: 60px;
    }

    /* Sidebar */
    .sidebar {
      position: sticky;
      top: 40px;
      align-self: flex-start;
      width: 220px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .brand h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .brand .abbr {
      font-size: 13px;
      color: #999;
      margin-top: 2px;
    }

    .tagline {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.4;
    }

    .tagline-desc {
      margin-top: 12px;
      font-size: 14px;
      color: #888;
      line-height: 1.6;
    }

    .nav-links {
      display: flex;
      gap: 8px;
    }

    .nav-links a {
      font-size: 13px;
      color: #888;
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: #1a1a1a;
    }

    .nav-links span {
      color: #ccc;
      font-size: 13px;
    }

    .footer-info {
      margin-top: auto;
      font-size: 12px;
      color: #bbb;
      line-height: 1.6;
    }

    /* Card Grid */
    .grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 28px;
      align-content: start;
    }

    .card {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .card-image {
      width: 100%;
      aspect-ratio: 3 / 4;
      background: #f5f5f5;
      border-radius: 6px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .card-icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.3s ease;
    }

    .card-icon img {
      max-width: 70%;
      max-height: 50%;
      object-fit: contain;
      border-radius: 4px;
      opacity: 0.9;
    }

    .card:hover .card-icon {
      opacity: 0;
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      transition: background 0.3s ease;
    }

    .card:hover .card-overlay {
      background: rgba(0, 0, 0, 0.4);
    }

    .card-desc {
      font-size: 18px;
      font-weight: 500;
      color: #fff;
      line-height: 1.5;
      text-align: center;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .card:hover .card-desc {
      opacity: 1;
      transform: translateY(0);
    }

    .card-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
      font-size: 14px;
      font-weight: 400;
    }

    .card-label .arrow {
      font-size: 14px;
      color: #bbb;
      transition: color 0.2s, transform 0.2s;
    }

    .card:hover .card-label .arrow {
      color: #1a1a1a;
      transform: translate(1px, -1px);
    }

    /* Responsive */
    @media (max-width: 900px) {
      .layout {
        flex-direction: column;
        padding: 28px;
        gap: 36px;
      }

      .sidebar {
        position: static;
        width: 100%;
        flex-direction: column;
        gap: 16px;
      }

      .footer-info {
        margin-top: 8px;
      }

      .grid {
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 20px;
      }
    }

    @media (max-width: 500px) {
      .grid {
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      .card-label {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <h1>Nueva Web Tools</h1>
        <div class="abbr">NWT</div>
      </div>

      <div>
        <div class="tagline">Simple tools for placement teams.</div>
        <p class="tagline-desc">
          Built to simplify daily workflows.<br>
          No logins. No clutter.<br>
          Just tools that work.
        </p>
      </div>

      <nav class="nav-links">
        <a href="#">Sites</a>
        <span>,</span>
        <a href="#">About</a>
      </nav>

      <div class="footer-info">
        Built by Nueva.<br>
        All tools free to use.<br>
        Last updated 03/16/26
      </div>
    </aside>

    <main class="grid" id="tools-grid">
      <!-- Cards injected by JS -->
    </main>
  </div>

  <script>
    const tools = [
      {
        name: "Room Assignment",
        url: "https://nuevawebtools.github.io/roomassignments/",
        icon: "screenshots/roomassignments.png",
        color: "#c4a882",
        desc: "Assign students to rooms quickly and easily.",
      },
      {
        name: "Trips Placement",
        url: "#",
        icon: "screenshots/tripsplacement.png",
        color: "#7a9e7e",
        desc: "Organize trip groups and placements.",
      },
      {
        name: "CSL Placement",
        url: "#",
        icon: "screenshots/cslplacement.png",
        color: "#8a9ab5",
        desc: "Manage community service learning placements.",
      },
      {
        name: "Storymap Generator",
        url: "https://nuevawebtools.github.io/storymap/",
        icon: "screenshots/storymap.png",
        color: "#c27c5e",
        desc: "Create interactive storymaps from spreadsheet data.",
      },
      {
        name: "US Attendance Tracker",
        url: "#",
        icon: "screenshots/attendancetracker.png",
        color: "#6b8a7a",
        desc: "Track upper school student attendance.",
      },
    ];

    const grid = document.getElementById("tools-grid");

    tools.forEach((tool) => {
      const card = document.createElement("a");
      card.className = "card";
      card.href = tool.url;
      card.target = "_blank";
      card.rel = "noopener noreferrer";

      card.innerHTML = `
        <div class="card-image" style="background: ${tool.color};">
          <div class="card-icon">
            <img src="${tool.icon}" alt="${tool.name}" onerror="this.style.display='none'">
          </div>
          <div class="card-overlay">
            <p class="card-desc">${tool.desc || ""}</p>
          </div>
        </div>
        <div class="card-label">
          <span>${tool.name}</span>
          <span class="arrow">&nearr;</span>
        </div>
      `;

      grid.appendChild(card);
    });
  </script>
</body>
</html>
